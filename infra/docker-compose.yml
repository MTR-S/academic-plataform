services:
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_AUTH_DB}
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-academic:
    image: mysql:8.0
    container_name: mysql-academic
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_ACADEMIC_DB}
    ports:
      - "3308:3306"
    volumes:
      - mysql_academic_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-assignment:
    image: mysql:8.0
    container_name: mysql-assignment
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_ASSIGNMENT_DB}
    ports:
      - "3309:3306"
    volumes:
      - mysql_assignment_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

    academic-service:
    build:
      context: ../services/academic-service
      dockerfile: Dockerfile
    container_name: academic-service
    ports:
      - "8082:8000"
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql-academic:3306/${MYSQL_ACADEMIC_DB}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql-academic:
        condition: service_healthy
    networks:
      - devops-network

auth-service:
    image: matheus1401docker/auth-service:latest
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-auth:3306/${MYSQL_AUTH_DB}?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - devops-network

  assignment-service:
    image: matheus1401docker/assignment-service:latest
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-assignment:3306/${MYSQL_ASSIGNMENT_DB}?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - ACADEMIC_SERVICE_URL=http://academic-service:8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql-assignment:
        condition: service_healthy
    networks:
      - devops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - devops-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - devops-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - devops-network

volumes:
  mysql_auth_data:
  mysql_academic_data:
  mysql_assignment_data:

networks:
  devops-network:
    driver: bridge