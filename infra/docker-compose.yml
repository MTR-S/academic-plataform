version: '3.8'

services:
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_AUTH_DB}
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-academic:
    image: mysql:8.0
    container_name: mysql-academic
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_ACADEMIC_DB}
    ports:
      - "3308:3306"
    volumes:
      - mysql_academic_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INIT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INIT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - devops-network
    healthcheck:
      # NOVO MODELO: Utilizando mongosh com autenticação
      test: ["CMD", "mongosh", "-u", "${MONGO_INIT_USER}", "-p", "${MONGO_INIT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    image: matheus1401docker/auth-service:latest
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-auth:3306/${MYSQL_AUTH_DB}?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - devops-network

  academic-service:
    build:
      context: ../services/academic-service
      dockerfile: Dockerfile
    container_name: academic-service
    ports:
      - "8082:8000"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_ACADEMIC_DB=${MYSQL_ACADEMIC_DB}
      - DB_HOST=mysql-academic
      - DB_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql-academic:
        condition: service_healthy
    networks:
      - devops-network

  assignment-service:
    image: matheus1401docker/assignment-service:latest
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8080
      # O Spring fará a ligação utilizando os hosts internos do Docker
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_INIT_USER}:${MONGO_INIT_PASSWORD}@mongo-db:27017/assignments?authSource=admin
      - ACADEMIC_SERVICE_URL=http://academic-service:8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo-db:
        condition: service_healthy
    networks:
      - devops-network

  # --- Monitoring Stack (PLG) ---

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - devops-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - devops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  mysql_auth_data:
  mysql_academic_data:
  mongo_data:
  loki_data:
  grafana_data:

networks:
  devops-network:
    driver: bridge