version: '3.8'

services:
  # --- BANCO RELACIONAL 1: AUTH SERVICE ---
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_AUTH_DB}
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BANCO RELACIONAL 2: ACADEMIC SERVICE ---
  mysql-academic:
    image: mysql:8.0
    container_name: mysql-academic
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_ACADEMIC_DB}
    ports:
      - "3308:3306"
    volumes:
      - mysql_academic_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BANCO NoSQL: ASSIGNMENT SERVICE ---
  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INIT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INIT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - devops-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # --- SERVIÇO DE AUTENTICAÇÃO (Java) ---
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-auth:3306/${MYSQL_AUTH_DB}?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - devops-network

  # --- SERVIÇO ACADÊMICO (Python) ---
  academic-service:
    build:
      context: ../services/academic-service
      dockerfile: Dockerfile
    container_name: academic-service
    ports:
      - "8082:8000"
    environment:
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@mysql-academic:3306/${MYSQL_ACADEMIC_DB}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql-academic:
        condition: service_healthy
    networks:
      - devops-network

  # --- SERVIÇO DE TAREFAS (Java) ---
  assignment-service:
    build:
      context: ../services/assignment-service
      dockerfile: Dockerfile
    container_name: assignment-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_INIT_USER}:${MONGO_INIT_PASSWORD}@mongo-db:27017/assignments?authSource=admin
      - ACADEMIC_SERVICE_URL=http://academic-service:8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongo-db:
        condition: service_healthy
    networks:
      - devops-network

volumes:
  mysql_auth_data:
  mysql_academic_data:
  mongo_data:

networks:
  devops-network:
    driver: bridge