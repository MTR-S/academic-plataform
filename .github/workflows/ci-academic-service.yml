name: CI/CD - Academic Service

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'services/academic-service/**'
      - '.github/workflows/ci-academic-service.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/academic-service/**'
      - '.github/workflows/ci-academic-service.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./services/academic-service

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy pymysql pydantic pydantic-settings pytest httpx

      - name: Executar Testes Automatizados
        env:
          DATABASE_URL: "mysql+pymysql://root:root@127.0.0.1:3306/test_db"
        run: pytest

      - name: Autenticar no Docker Hub
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir e Enviar Imagem Docker
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v5
        with:
          context: ./services/academic-service
          file: ./services/academic-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/academic-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/academic-service:${{ github.sha }}