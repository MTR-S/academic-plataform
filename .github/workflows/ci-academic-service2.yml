name: API-Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'services/academic-service/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/academic-service/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        # Mapeia a porta do container para o host (127.0.0.1:3306).
        # Sem isso, o runner Ubuntu não consegue alcançar o container MySQL.
        ports:
          - 3306:3306
        # Usa 127.0.0.1 (TCP) para não depender de socket Unix.
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: 1. Clonar o repositório
        uses: actions/checkout@v3

      - name: 2. Configurar o Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 3. Instalar dependências
        working-directory: services/academic-service
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy pymysql pydantic pydantic-settings pytest httpx anyio

      - name: 4. Esperar o MySQL ficar disponível
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -proot --silent 2>/dev/null && echo "MySQL pronto!" && break
            echo "Aguardando o MySQL iniciar... ($i/30)"
            sleep 2
          done

      - name: 5. Rodar os testes automatizados
        working-directory: services/academic-service
        env:
          MYSQL_ROOT_PASSWORD: "root"
          MYSQL_ACADEMIC_DB: "test_db"
          DB_USER: "root"
          DB_HOST: "127.0.0.1"
          DB_PORT: "3306"
        run: |
          pytest