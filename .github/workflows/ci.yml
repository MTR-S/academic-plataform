name: API-Tests

# O robô vai rodar toda vez que alguém fizer um Pull Request para a main
on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    # Subindo um banco de dados temporário na nuvem para os testes não quebrarem
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 1. Clonar o repositório
        uses: actions/checkout@v3

      - name: 2. Configurar o Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 3. Instalar dependências do projeto
        # Se você tiver um requirements.txt, pode trocar isso por: pip install -r requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy pymysql pydantic pydantic-settings pytest httpx

      - name: 4. Rodar os testes automatizados
        # Passamos a URL do banco temporário invisível para o FastAPI
        env:
          DATABASE_URL: "mysql+pymysql://root:root@127.0.0.1:3306/test_db"
        run: |
          pytest