name: API-Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'services/academic-service/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/academic-service/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        # O GitHub cria uma rede interna onde o nome da máquina é 'mysql'
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 1. Clonar o repositório
        uses: actions/checkout@v3

      - name: 2. Configurar o Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: 3. Instalar dependências
        working-directory: services/academic-service
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy pymysql pydantic pydantic-settings pytest httpx

      - name: 4. Esperar o MySQL ficar disponível
        run: |
          for i in {1..30}; do
            mysqladmin ping -h mysql -u root -proot >/dev/null 2>&1 && break
            echo "Aguardando o MySQL iniciar..."
            sleep 1
          done

      - name: 5. Rodar os testes automatizados
        working-directory: services/academic-service
        env:
          # Note que agora apontamos para '@mysql' em vez de '@127.0.0.1'
          DATABASE_URL: "mysql+pymysql://root:root@mysql:3306/test_db"
          MYSQL_ROOT_PASSWORD: "root"
          MYSQL_ACADEMIC_DB: "test_db"
        run: |
          pytest