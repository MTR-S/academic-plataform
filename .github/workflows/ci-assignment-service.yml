name: CI/CD - Assignment Service

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'services/assignment-service/**'
      - '.github/workflows/ci-assignment-service.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/assignment-service/**'
      - '.github/workflows/ci-assignment-service.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./services/assignment-service

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executar Testes e Compilação
        run: mvn clean package

      - name: Autenticar no Docker Hub
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir e Enviar Imagem Docker
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v5
        with:
          context: ./services/assignment-service
          file: ./services/assignment-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment-service:${{ github.sha }}